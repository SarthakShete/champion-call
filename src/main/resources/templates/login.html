<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - ChampionCall</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body class="auth-body">
    <div class="auth-bg"></div>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a th:href="@{/home}" class="logo">
            <img
              th:src="@{/Images/champion.webp}"
              alt="ChampionCall Logo"
              class="custom-logo"
            />
            ChampionCall
          </a>
          <h2 class="auth-title">GET IN THE GAME</h2>
          <p class="auth-subtitle">
            Enter your details to access your dashboard.
          </p>
        </div>

        <a th:href="@{/oauth2/authorization/google}" class="btn-google">
          <svg width="22" height="22" viewBox="0 0 48 48">
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            ></path>
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            ></path>
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
            ></path>
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            ></path>
          </svg>
          Continue with Google
        </a>

        <div class="auth-divider">
          <span>OR SIGN IN WITH EMAIL</span>
        </div>

        <form th:action="@{/login}" method="POST" class="auth-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-envelope input-icon"></i>
              <input
                type="email"
                id="email"
                name="username"
                placeholder="player@championcall.com"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <div class="label-flex">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-dark-solid">
            Sign In <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <p class="auth-footer-text">
          Don't have an account?
          <a href="#" class="text-orange-link">Sign up</a>
        </p>
      </div>
    </div>
  </body>
</html>
